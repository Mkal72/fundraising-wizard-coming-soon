<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Fundraising Wizard — Something magical is coming to fundraising soon. Be the first to know.">
<meta name="theme-color" content="#050b1f">
<title>Fundraising Wizard — Coming Soon</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/da4qwxq3u/image/upload/w_32,h_32,c_fit/v1771541455/fw-coming-soon/fw-coming-soon/fundraising-wizard-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:       #0E1B4D;
    --deep:       #050b1f;
    --coral:      #FF7F50;
    --coral-dark: #e66a3d;
    --gold:       #F59E0B;
    --iris:       #6366F1;
    --white:      #FFFFFF;
  }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Inter', Arial, Helvetica, sans-serif;
    background: var(--deep);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Sparkle Canvas ── */
  #sparkle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  /* ── Ambient Stars ── */
  .ambient-stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .ambient-stars .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0.05; transform: scale(0.6); }
    100% { opacity: var(--max-o, 0.5); transform: scale(1.3); }
  }

  /* ══════════════════════════════════
     HERO
     ══════════════════════════════════ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 60px 24px 40px;
    min-height: 0;
  }

  /* ── Logo Shrine — light source ── */
  .logo-shrine {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 56px;
  }

  .logo-shrine .radial-glow {
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,127,80,0.12) 0%, rgba(245,158,11,0.07) 25%,
      rgba(99,102,241,0.03) 45%, transparent 70%);
    animation: breathe 6s ease-in-out infinite alternate;
    pointer-events: none;
  }

  .logo-shrine .light-rays {
    position: absolute;
    width: 1100px; height: 1100px;
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,127,80,0.04) 10deg, transparent 20deg,
      transparent 40deg, rgba(245,158,11,0.03) 50deg, transparent 60deg,
      transparent 80deg, rgba(255,255,255,0.02) 90deg, transparent 100deg,
      transparent 120deg, rgba(255,127,80,0.035) 130deg, transparent 140deg,
      transparent 170deg, rgba(245,158,11,0.025) 180deg, transparent 190deg,
      transparent 220deg, rgba(255,255,255,0.02) 230deg, transparent 240deg,
      transparent 270deg, rgba(255,127,80,0.03) 280deg, transparent 290deg,
      transparent 320deg, rgba(245,158,11,0.025) 330deg, transparent 340deg,
      transparent 360deg);
    border-radius: 50%;
    animation: rotate-rays 60s linear infinite;
    pointer-events: none;
  }

  .logo-shrine .core-glow {
    position: absolute;
    width: 800px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,220,180,0.07) 0%, rgba(255,180,130,0.04) 25%, transparent 55%);
    filter: blur(20px);
    animation: breathe 4s ease-in-out 1s infinite alternate;
    pointer-events: none;
  }

  @keyframes breathe {
    0%   { transform: scale(0.92); opacity: 0.7; }
    100% { transform: scale(1.08); opacity: 1; }
  }
  @keyframes rotate-rays {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ══════════════════════════════════
     HTML LOGO — no PNG, pure text
     ══════════════════════════════════ */
  .logo-text {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: baseline;
    gap: 0;
    user-select: none;
    animation: logo-reveal 2s ease-out both;
    filter:
      drop-shadow(0 0 30px rgba(255, 127, 80, 0.25))
      drop-shadow(0 0 60px rgba(255, 127, 80, 0.12))
      drop-shadow(0 0 100px rgba(245, 158, 11, 0.08));
  }

  @keyframes logo-reveal {
    0%   { opacity: 0; transform: scale(0.85); filter: blur(16px) brightness(2.5); }
    50%  { opacity: 1; filter: blur(0) brightness(1.4)
           drop-shadow(0 0 40px rgba(255,127,80,0.4)); }
    100% { opacity: 1; transform: scale(1);
           filter:
             drop-shadow(0 0 30px rgba(255,127,80,0.25))
             drop-shadow(0 0 60px rgba(255,127,80,0.12))
             drop-shadow(0 0 100px rgba(245,158,11,0.08)); }
  }

  .logo-word {
    font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
    font-weight: 800;
    font-size: clamp(48px, 8.5vw, 96px);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .logo-word.fundraising {
    color: var(--white);
    text-shadow:
      0 0 40px rgba(255, 255, 255, 0.1),
      0 2px 4px rgba(0, 0, 0, 0.3);
  }

  .logo-word.wizard-wrap {
    position: relative;
    color: var(--coral);
    text-shadow:
      0 0 30px rgba(255, 127, 80, 0.3),
      0 0 60px rgba(255, 127, 80, 0.1),
      0 2px 4px rgba(0, 0, 0, 0.3);
  }

  /* ── Sparkle star above the "w" ── */
  .logo-spark {
    position: absolute;
    top: -0.35em;
    left: 0.15em;
    width: 0.4em;
    height: 0.4em;
    animation: spark-pulse 3s ease-in-out infinite alternate;
  }
  .logo-spark svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 6px rgba(255, 127, 80, 0.6));
  }

  @keyframes spark-pulse {
    0%   { transform: scale(0.9) rotate(0deg); opacity: 0.8; }
    100% { transform: scale(1.15) rotate(15deg); opacity: 1; }
  }

  /* ── Tagline ── */
  .logo-tagline {
    position: relative;
    z-index: 2;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(10px, 1.6vw, 16px);
    color: var(--coral);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: clamp(6px, 1vw, 12px);
    text-align: center;
    text-shadow: 0 0 20px rgba(255, 127, 80, 0.2);
    animation: logo-reveal 2s ease-out 0.3s both;
    opacity: 0;
  }

  /* ── Logo container ── */
  .logo-container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Headline ── */
  .headline {
    font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 4.5vw, 52px);
    line-height: 1.2;
    text-align: center;
    letter-spacing: -0.02em;
    animation: text-in 1.2s ease-out 0.8s both;
  }
  .headline .magic {
    display: inline-block;
    background: linear-gradient(135deg, var(--coral) 0%, var(--gold) 50%, var(--coral) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: text-in 1.2s ease-out 0.8s both, shimmer-text 4s ease-in-out 3.5s infinite;
  }

  @keyframes text-in {
    from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
    to   { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  @keyframes shimmer-text {
    0%, 100% { background-position: 0% center; }
    50%      { background-position: 100% center; }
  }

  /* ── Subtext ── */
  .subtext {
    font-size: clamp(14px, 2vw, 17px);
    font-weight: 300;
    color: rgba(255, 255, 255, 0.45);
    line-height: 1.7;
    max-width: 440px;
    text-align: center;
    margin-top: 20px;
    letter-spacing: 0.01em;
    animation: text-in 1.2s ease-out 1.1s both;
  }

  /* ═══════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════ */
  .footer-area {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 0 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .footer-area .sep {
    width: 64px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,127,80,0.3), transparent);
    margin-bottom: 32px;
  }

  .email-label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: text-in 1s ease-out 1.4s both;
  }

  .email-form-wrap {
    width: 100%;
    max-width: 420px;
    animation: text-in 1s ease-out 1.6s both;
  }

  .email-form {
    display: flex;
    gap: 0;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.04);
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .email-form:focus-within {
    border-color: rgba(255, 127, 80, 0.3);
    box-shadow: 0 0 0 4px rgba(255, 127, 80, 0.06), 0 8px 32px rgba(0,0,0,0.3);
  }

  .email-form input[type="email"] {
    flex: 1;
    padding: 15px 20px;
    border: none;
    background: transparent;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    min-width: 0;
  }
  .email-form input[type="email"]::placeholder {
    color: rgba(255, 255, 255, 0.25);
    font-weight: 300;
  }

  .email-form button {
    padding: 15px 28px;
    border: none;
    background: linear-gradient(135deg, var(--coral), var(--coral-dark));
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: filter 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .email-form button:hover { filter: brightness(1.1); }
  .email-form button:active { transform: scale(0.98); }

  .trust-line {
    margin-top: 14px;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.18);
    letter-spacing: 0.3px;
  }

  .copyright {
    margin-top: 48px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.1);
    letter-spacing: 0.5px;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .hero { padding: 40px 16px 24px; }
    .logo-shrine { margin-bottom: 40px; }
    .logo-shrine .radial-glow  { width: 500px; height: 500px; }
    .logo-shrine .light-rays   { width: 600px; height: 600px; }
    .logo-shrine .core-glow    { width: 400px; height: 400px; }
    .logo-text { flex-wrap: wrap; justify-content: center; }
    .email-form {
      flex-direction: column;
      border-radius: 12px;
    }
    .email-form button {
      padding: 16px;
      border-radius: 0 0 11px 11px;
    }
    .footer-area { padding: 0 20px 40px; }
  }
</style>
</head>
<body>

<div class="ambient-stars" id="ambient-stars"></div>
<canvas id="sparkle-canvas"></canvas>

<!-- ═══════════ HERO ═══════════ -->
<main class="hero">

  <div class="logo-shrine">
    <div class="radial-glow"></div>
    <div class="light-rays"></div>
    <div class="core-glow"></div>

    <div class="logo-container">
      <div class="logo-text">
        <span class="logo-word fundraising">fundraising</span>
        <span class="logo-word wizard-wrap">
          <span class="logo-spark">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 0 L18.5 12.5 L32 16 L18.5 19.5 L16 32 L13.5 19.5 L0 16 L13.5 12.5 Z" fill="#FF7F50"/>
            </svg>
          </span>
          wizard
        </span>
      </div>
      <p class="logo-tagline">Raise Like a Wizard</p>
    </div>
  </div>

  <h1 class="headline">
    Something <span class="magic">magical</span> is coming<br>to fundraising
  </h1>

  <p class="subtext">
    Premium products. Zero chaos. Profit that actually matters.<br>
    The fundraiser your team deserves is almost here.
  </p>

</main>

<!-- ═══════════ FOOTER — Email ═══════════ -->
<footer class="footer-area">
  <div class="sep"></div>
  <p class="email-label">Be the first to know</p>

  <div class="email-form-wrap">
    <!--
      ╔══════════════════════════════════════════════════════════╗
      ║  REPLACE THIS FORM WITH YOUR GHL EMBED CODE             ║
      ╚══════════════════════════════════════════════════════════╝
    -->
    <form class="email-form" onsubmit="return handleSubmit(event)">
      <input type="email" placeholder="Enter your email" required aria-label="Email address">
      <button type="submit">Notify Me</button>
    </form>
    <p class="trust-line">No spam. Just one email when we launch.</p>
  </div>

  <p class="copyright">&copy; 2026 Fundraising Wizard</p>
</footer>

<script>
// ── Ambient Stars ──
(function() {
  const container = document.getElementById('ambient-stars');
  const count = window.innerWidth < 600 ? 60 : 120;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 0.5;
    const rand = Math.random();
    let color;
    if (rand < 0.6)      color = `rgba(255,255,255,${0.3+Math.random()*0.4})`;
    else if (rand < 0.8) color = `rgba(255,127,80,${0.2+Math.random()*0.3})`;
    else if (rand < 0.95)color = `rgba(245,158,11,${0.15+Math.random()*0.25})`;
    else                 color = `rgba(99,102,241,${0.15+Math.random()*0.2})`;
    star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${color};--dur:${2+Math.random()*5}s;--max-o:${0.2+Math.random()*0.5};animation-delay:${Math.random()*5}s;`;
    container.appendChild(star);
  }
})();

// ── Sparkle Mouse Trail ──
(function() {
  const canvas = document.getElementById('sparkle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouseX = -200, mouseY = -200;
  let lastEmit = 0;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  document.addEventListener('touchmove', e => {
    if (e.touches.length) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }
  }, { passive: true });

  class Particle {
    constructor(x, y) {
      this.x = x + (Math.random()-0.5)*20;
      this.y = y + (Math.random()-0.5)*20;
      this.size = Math.random()*3.5+1;
      this.speedX = (Math.random()-0.5)*1.8;
      this.speedY = (Math.random()-0.5)*1.8-0.8;
      this.life = 1;
      this.decay = 0.012+Math.random()*0.018;
      this.rotation = Math.random()*Math.PI*2;
      this.rotSpeed = (Math.random()-0.5)*0.08;
      const palette = [[255,127,80],[245,158,11],[255,200,80],[255,170,110],[255,230,180],[99,102,241]];
      const weights = [0.25,0.25,0.15,0.12,0.15,0.08];
      let r = Math.random(), c = 0;
      this.colorIdx = 0;
      for (let i = 0; i < weights.length; i++) { c += weights[i]; if (r <= c) { this.colorIdx = i; break; } }
      this.color = palette[this.colorIdx];
      this.isStar = Math.random() > 0.55;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      this.speedY -= 0.008; this.life -= this.decay;
      this.rotation += this.rotSpeed; this.size *= 0.997;
    }
    draw(ctx) {
      if (this.life <= 0) return;
      const a = this.life*0.85;
      const [r,g,b] = this.color;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = a;
      if (this.isStar) {
        ctx.beginPath();
        const s = this.size;
        for (let i = 0; i < 4; i++) {
          const ang = (i*Math.PI)/2;
          ctx.lineTo(Math.cos(ang)*s*1.8, Math.sin(ang)*s*1.8);
          ctx.lineTo(Math.cos(ang+Math.PI/4)*s*0.35, Math.sin(ang+Math.PI/4)*s*0.35);
        }
        ctx.closePath();
        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
        ctx.shadowColor = `rgba(${r},${g},${b},0.7)`;
        ctx.shadowBlur = 10;
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(0,0,this.size,0,Math.PI*2);
        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
        ctx.shadowColor = `rgba(${r},${g},${b},0.6)`;
        ctx.shadowBlur = 14;
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function animate(ts) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (mouseX > 0 && mouseY > 0 && ts-lastEmit > 25) {
      for (let i = 0; i < 3; i++) particles.push(new Particle(mouseX, mouseY));
      lastEmit = ts;
    }
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) { p.update(); p.draw(ctx); }
    if (particles.length > 250) particles = particles.slice(-250);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();

async function handleSubmit(e) {
  e.preventDefault();
  const input = e.target.querySelector('input[type="email"]');
  const btn = e.target.querySelector('button');
  const email = input.value.trim();
  if (!email) return;

  // Disable while submitting
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await fetch('https://services.leadconnectorhq.com/hooks/HBeyqt9NPABBF99E39nt/webhook-trigger/0447145d-57da-470d-88b0-2ff9071010b3', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      mode: 'no-cors',
      body: JSON.stringify({ email: email, source: 'coming-soon-page' })
    });

    // Success state
    btn.textContent = "You're on the list!";
    btn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
    input.value = '';
    setTimeout(() => {
      btn.textContent = 'Notify Me';
      btn.style.background = '';
      btn.disabled = false;
    }, 4000);
  } catch (err) {
    // Even with no-cors, the request goes through — show success
    btn.textContent = "You're on the list!";
    btn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
    input.value = '';
    setTimeout(() => {
      btn.textContent = 'Notify Me';
      btn.style.background = '';
      btn.disabled = false;
    }, 4000);
  }
}
</script>

</body>
</html>
