<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Fundraising Wizard — Something magical is coming to fundraising soon. Be the first to know.">
<meta name="theme-color" content="#0E1B4D">
<title>Fundraising Wizard — Coming Soon</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/da4qwxq3u/image/upload/w_32,h_32,c_fit/v1771541455/fw-coming-soon/fw-coming-soon/fundraising-wizard-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ── Reset ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Brand Tokens ── */
  :root {
    --navy:   #0E1B4D;
    --navy-light: #1a2d6d;
    --coral:  #FF7F50;
    --coral-dark: #e66a3d;
    --gold:   #F59E0B;
    --iris:   #6366F1;
    --cloud:  #F9FAFB;
    --white:  #FFFFFF;
    --gray:   #9CA3AF;
  }

  /* ── Page ── */
  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Inter', Arial, Helvetica, sans-serif;
    background: linear-gradient(170deg, #070e29 0%, var(--navy) 40%, #12225a 100%);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Sparkle Canvas ── */
  #sparkle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Ambient Stars ── */
  .ambient-stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .ambient-stars .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: var(--max-o, 0.6); transform: scale(1.2); }
  }

  /* ── Main Content ── */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
    max-width: 680px;
    width: 100%;
  }

  /* ── Logo Card ── */
  .logo-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 48px 56px;
    margin-bottom: 48px;
    animation: float-in 1s ease-out both;
    position: relative;
    overflow: hidden;
  }
  .logo-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(255,127,80,0.2), transparent 50%, rgba(245,158,11,0.15));
    z-index: -1;
    pointer-events: none;
  }

  .logo-card img {
    width: 100%;
    max-width: 420px;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 24px rgba(255, 127, 80, 0.15));
  }

  /* ── Headline ── */
  .headline {
    font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.25;
    margin-bottom: 16px;
    animation: float-in 1s ease-out 0.2s both;
  }
  .headline .magic {
    background: linear-gradient(135deg, var(--coral), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Subtext ── */
  .subtext {
    font-size: clamp(15px, 2.5vw, 18px);
    color: var(--gray);
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 40px;
    animation: float-in 1s ease-out 0.4s both;
  }

  /* ── Email Section ── */
  .email-section {
    width: 100%;
    max-width: 460px;
    animation: float-in 1s ease-out 0.6s both;
  }
  .email-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── GHL Form Container ── */
  .ghl-form-container {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 32px 28px;
    position: relative;
  }

  /* ── Placeholder form (replace with GHL embed) ── */
  .placeholder-form {
    display: flex;
    gap: 12px;
  }
  .placeholder-form input[type="email"] {
    flex: 1;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.08);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .placeholder-form input[type="email"]::placeholder {
    color: rgba(255, 255, 255, 0.35);
  }
  .placeholder-form input[type="email"]:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 3px rgba(255, 127, 80, 0.15);
  }
  .placeholder-form button {
    padding: 14px 24px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--coral), var(--coral-dark));
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(255, 127, 80, 0.3);
  }
  .placeholder-form button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(255, 127, 80, 0.4);
  }
  .placeholder-form button:active {
    transform: translateY(0);
  }

  /* ── Trust line ── */
  .trust-line {
    margin-top: 12px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
  }

  /* ── Footer ── */
  .footer {
    position: relative;
    z-index: 1;
    margin-top: auto;
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.2);
  }

  /* ── Subtle coral glow behind content ── */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.coral {
    width: 400px; height: 400px;
    background: rgba(255, 127, 80, 0.08);
    top: 20%; left: 50%;
    transform: translateX(-50%);
    animation: pulse-glow 6s ease-in-out infinite alternate;
  }
  .glow-orb.gold {
    width: 300px; height: 300px;
    background: rgba(245, 158, 11, 0.05);
    bottom: 10%; right: 15%;
    animation: pulse-glow 8s ease-in-out 2s infinite alternate;
  }
  @keyframes pulse-glow {
    0%   { opacity: 0.5; transform: translateX(-50%) scale(0.9); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
  }

  /* ── Entrance Animation ── */
  @keyframes float-in {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Mobile ── */
  @media (max-width: 540px) {
    .logo-card {
      padding: 32px 28px;
      margin-bottom: 36px;
      border-radius: 18px;
    }
    .logo-card img {
      max-width: 280px;
    }
    .placeholder-form {
      flex-direction: column;
    }
    .placeholder-form button {
      width: 100%;
      padding: 16px;
    }
    .ghl-form-container {
      padding: 24px 20px;
    }
  }
</style>
</head>
<body>

<!-- Ambient background stars -->
<div class="ambient-stars" id="ambient-stars"></div>

<!-- Subtle glow orbs -->
<div class="glow-orb coral"></div>
<div class="glow-orb gold"></div>

<!-- Sparkle canvas for mouse trail -->
<canvas id="sparkle-canvas"></canvas>

<!-- Main Content -->
<div class="content">

  <!-- Logo in frosted glass card -->
  <div class="logo-card">
    <img
      src="https://res.cloudinary.com/da4qwxq3u/image/upload/w_840,q_auto,f_auto/v1771541455/fw-coming-soon/fw-coming-soon/fundraising-wizard-logo.png"
      alt="Fundraising Wizard"
      width="420"
      height="151"
    >
  </div>

  <!-- Headline -->
  <h1 class="headline">
    Something <span class="magic">magical</span> is coming<br>to fundraising soon
  </h1>

  <!-- Subtext -->
  <p class="subtext">
    We're building the fundraiser your team actually deserves. Premium products, zero chaos, and profit that makes a real difference.
  </p>

  <!-- Email Capture -->
  <div class="email-section">
    <p class="email-label">Be the first to know</p>

    <div class="ghl-form-container">
      <!--
        ╔══════════════════════════════════════════════════════════╗
        ║  REPLACE THIS PLACEHOLDER FORM WITH YOUR GHL EMBED     ║
        ║  See instructions below the page for how to set up     ║
        ║  your GoHighLevel form and paste the embed code here.  ║
        ╚══════════════════════════════════════════════════════════╝
      -->
      <form class="placeholder-form" onsubmit="return handlePlaceholder(event)">
        <input type="email" placeholder="Enter your email" required aria-label="Email address">
        <button type="submit">Notify Me</button>
      </form>
      <p class="trust-line">No spam, ever. Just one email when we launch.</p>
    </div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  &copy; 2026 Fundraising Wizard. All rights reserved.
</div>

<script>
// ── Ambient Stars ──
(function initStars() {
  const container = document.getElementById('ambient-stars');
  const count = window.innerWidth < 600 ? 40 : 80;

  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 1;
    const colors = ['rgba(255,127,80,0.7)', 'rgba(245,158,11,0.7)', 'rgba(99,102,241,0.5)', 'rgba(255,255,255,0.6)'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      background: ${color};
      --dur: ${2 + Math.random() * 4}s;
      --max-o: ${0.3 + Math.random() * 0.5};
      animation-delay: ${Math.random() * 4}s;
    `;
    container.appendChild(star);
  }
})();

// ── Sparkle Mouse Trail ──
(function initSparkles() {
  const canvas = document.getElementById('sparkle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouseX = -100, mouseY = -100;
  let lastEmit = 0;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Track mouse
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Track touch
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }
  }, { passive: true });

  // Particle class
  class Particle {
    constructor(x, y) {
      this.x = x + (Math.random() - 0.5) * 16;
      this.y = y + (Math.random() - 0.5) * 16;
      this.size = Math.random() * 4 + 1.5;
      this.speedX = (Math.random() - 0.5) * 2;
      this.speedY = (Math.random() - 0.5) * 2 - 1; // slight upward drift
      this.life = 1;
      this.decay = 0.015 + Math.random() * 0.02;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.1;

      // Brand colors: gold + coral with occasional iris
      const palette = [
        [255, 127, 80],   // coral
        [245, 158, 11],   // gold
        [255, 190, 60],   // bright gold
        [255, 160, 100],  // soft coral
        [99, 102, 241],   // iris (rare)
      ];
      const weights = [0.3, 0.3, 0.15, 0.15, 0.1];
      let r = Math.random(), cumulative = 0;
      let idx = 0;
      for (let i = 0; i < weights.length; i++) {
        cumulative += weights[i];
        if (r <= cumulative) { idx = i; break; }
      }
      this.color = palette[idx];

      // Some particles are sparkle shapes
      this.isStar = Math.random() > 0.6;
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.speedY -= 0.01; // float up
      this.life -= this.decay;
      this.rotation += this.rotationSpeed;
      this.size *= 0.995;
    }

    draw(ctx) {
      if (this.life <= 0) return;
      const alpha = this.life * 0.8;
      const [r, g, b] = this.color;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = alpha;

      if (this.isStar) {
        // Draw 4-point sparkle
        ctx.beginPath();
        const s = this.size;
        for (let i = 0; i < 4; i++) {
          const angle = (i * Math.PI) / 2;
          const outerX = Math.cos(angle) * s * 1.5;
          const outerY = Math.sin(angle) * s * 1.5;
          const innerAngle = angle + Math.PI / 4;
          const innerX = Math.cos(innerAngle) * s * 0.4;
          const innerY = Math.sin(innerAngle) * s * 0.4;
          if (i === 0) ctx.moveTo(outerX, outerY);
          else ctx.lineTo(outerX, outerY);
          ctx.lineTo(innerX, innerY);
        }
        ctx.closePath();
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.shadowColor = `rgba(${r},${g},${b},0.6)`;
        ctx.shadowBlur = 8;
        ctx.fill();
      } else {
        // Draw glowing circle
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.shadowColor = `rgba(${r},${g},${b},0.5)`;
        ctx.shadowBlur = 12;
        ctx.fill();
      }

      ctx.restore();
    }
  }

  // Animation loop
  function animate(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Emit particles at mouse position
    if (mouseX > 0 && mouseY > 0 && timestamp - lastEmit > 30) {
      const count = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(mouseX, mouseY));
      }
      lastEmit = timestamp;
    }

    // Update and draw
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      p.update();
      p.draw(ctx);
    }

    // Cap particle count for performance
    if (particles.length > 200) {
      particles = particles.slice(-200);
    }

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();

// ── Placeholder form handler ──
function handlePlaceholder(e) {
  e.preventDefault();
  const input = e.target.querySelector('input[type="email"]');
  const btn = e.target.querySelector('button');
  btn.textContent = 'Coming Soon!';
  btn.style.background = 'linear-gradient(135deg, #6366F1, #4f46e5)';
  input.value = '';
  setTimeout(() => {
    btn.textContent = 'Notify Me';
    btn.style.background = '';
  }, 2500);
}
</script>

</body>
</html>
